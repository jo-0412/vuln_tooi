title: "U-64 주기적 보안 패치 및 벤더 권고사항 적용"

pass:
  summary: "주기적 보안 패치 관리 흔적이 확인됩니다."
  detail: >
    자동 업데이트 설정, 최근 패치 이력, 패치 관리 도구 흔적 중 일부가 확인되어
    보안 패치가 일정 수준 이상 관리되고 있습니다.

fail:
  summary: "주기적 보안 패치 관리 흔적이 부족합니다."
  detail: >
    최신 보안 패치가 적용되지 않아 이미 공개된 취약점을 이용한 침해사고 가능성이 높습니다.

manual:
  summary: "패치 관리 상태를 추가 확인해야 합니다."
  detail: >
    일부 설정 또는 로그는 존재하지만
    실제로 주기적인 보안 패치 정책에 따라 관리되고 있는지 추가 검토가 필요합니다.

error:
  summary: "점검 실행 중 오류가 발생했습니다."
  detail: >
    패치 설정 파일 또는 패키지 상태 수집 중 오류가 발생했습니다.

remediation:
  summary: "벤더 권고사항과 최신 패치 수준을 확인하고 주기적 패치 정책에 따라 적용해야 합니다."
  actions:
    - "서비스 영향도를 검토한 뒤 최신 보안 패치 수준을 확인합니다."
    - "자동 업데이트 또는 무인 보안 업데이트 설정을 점검합니다."
    - "정기점검보고서, 검토보고서, 작업계획서 등 패치 관리 문서를 유지합니다."
    - "업그레이드 가능한 패키지가 장기간 방치되지 않도록 주기적으로 점검합니다."
    - "벤더 권고사항과 보안 공지를 확인해 필요한 패치를 반영합니다."

evidence_labels:
  auto_upgrade_config_exists: "자동 업데이트 설정 파일 존재 여부"
  unattended_upgrade_config_exists: "무인 보안 업데이트 설정 파일 존재 여부"
  auto_upgrade_enabled: "자동 패키지 갱신/업데이트 활성화 여부"
  unattended_installed: "unattended-upgrades 설치 여부"
  recent_patch_history_present: "최근 패치 이력 존재 여부"
  unattended_log_present: "자동 업데이트 로그 존재 여부"
  upgradable_packages: "업그레이드 가능한 패키지 목록"
  upgradable_package_count: "업그레이드 가능한 패키지 수"
  os_version_info: "OS 및 커널 버전 정보"
  kernel_version: "현재 커널 버전"

notes:
  - "1차 구현은 최신 버전과의 정확한 비교보다 패치 관리 체계 존재 여부 확인에 중점을 둡니다."
  - "정책 문서와 작업계획서는 도구 자동수집 범위를 넘어설 수 있어 운영 증적과 함께 검토할 수 있습니다."
  - "배포판과 패키지 관리자에 따라 세부 구현 방식은 달라질 수 있습니다."