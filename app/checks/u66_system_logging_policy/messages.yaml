title: "U-66 정책에 따른 시스템 로깅 설정"

pass:
  summary: "정책에 따른 시스템 로깅 설정 흔적이 확인됩니다."
  detail: >
    로깅 설정, 서비스 상태, 주요 로그 파일 중 일부가 확인되어
    시스템 로깅 체계가 일정 수준 이상 동작하고 있습니다.

fail:
  summary: "시스템 로깅 설정이 미흡하거나 정책 흔적이 부족합니다."
  detail: >
    시스템 로깅이 미설정 또는 정책 미준수 상태라 사고 발생 시
    원인 규명과 증적 확보가 어렵습니다.

manual:
  summary: "시스템 로깅 정책 준수 여부를 추가 확인해야 합니다."
  detail: >
    일부 로깅 흔적은 존재하지만 조직 정책에 맞게 설정되어 있는지와
    실제 운영 정책 문서 존재 여부는 추가 검토가 필요합니다.

error:
  summary: "점검 실행 중 오류가 발생했습니다."
  detail: >
    로깅 설정 파일, 서비스 상태 또는 로그 파일 수집 중 오류가 발생했습니다.

remediation:
  summary: "조직 로그 정책을 수립하고, 그 정책에 맞게 syslog/rsyslog 설정과 서비스 적용 상태를 유지해야 합니다."
  actions:
    - "조직 로그 정책을 문서화하고 운영 기준을 수립합니다."
    - "/etc/rsyslog.conf 또는 /etc/syslog.conf 에 필요한 로그 기록 정책을 반영합니다."
    - "주요 보안 이벤트가 로그 파일에 실제로 기록되는지 확인합니다."
    - "설정 변경 후 rsyslog 또는 syslog 서비스를 재시작 또는 reload 하여 반영 여부를 확인합니다."
    - "정기적으로 로그 파일 생성과 보관 상태를 점검합니다."

evidence_labels:
  rsyslog_conf_exists: "rsyslog 설정 파일 존재 여부"
  syslog_conf_exists: "syslog 설정 파일 존재 여부"
  logging_policy_lines: "활성 로깅 설정 라인"
  rsyslog_service_active: "rsyslog 서비스 활성 여부"
  syslog_service_active: "syslog 서비스 활성 여부"
  major_log_files: "주요 로그 파일 존재 여부"
  major_log_file_count: "존재하는 주요 로그 파일 수"
  logging_policy_document_note: "로깅 정책 문서 확인 필요 여부"

notes:
  - "1차 구현은 정책 문서 자체보다 로깅 체계 존재 여부 확인에 중점을 둡니다."
  - "조직 로깅 정책 문서와 감사 기준은 자동 수집 범위 밖일 수 있습니다."
  - "배포판에 따라 syslog, rsyslog, journald 사용 방식이 다를 수 있습니다."