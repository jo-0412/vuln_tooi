check_type: "composite"

profile: "default_linux"

rules:
  special_permission_rule:
    description: >
      전체 파일시스템에서 SUID, SGID, Sticky bit 설정 파일 및 디렉터리를 수집하고,
      허용 목록 외 항목 존재 여부를 점검한다.

    scan_requirements:
      scan_root_required: true
      require_root_owned_suid_sgid_check: true

    allowlists:
      suid_files:
        - "/usr/bin/passwd"
        - "/usr/bin/su"
        - "/usr/bin/chfn"
        - "/usr/bin/chsh"
        - "/usr/bin/gpasswd"
        - "/usr/bin/newgrp"
        - "/usr/bin/sudo"
        - "/bin/su"
        - "/bin/ping"
        - "/bin/ping6"
        - "/usr/bin/pkexec"

      sgid_files:
        - "/usr/bin/wall"
        - "/usr/bin/expiry"
        - "/usr/bin/ssh-agent"
        - "/usr/bin/mlocate"

      sticky_dirs:
        - "/tmp"
        - "/var/tmp"
        - "/dev/shm"

    comparison_rules:
      unexpected_suid_files_fail: true
      unexpected_sgid_files_fail: true
      unexpected_sticky_dirs_manual: true

    pass_condition: >
      허용 목록 외 SUID/SGID 파일이 존재하지 않고
      Sticky bit 디렉터리도 정책상 허용 범위 내인 경우

    fail_condition: >
      허용 목록 외 SUID 또는 SGID 설정 파일이 존재하는 경우

    manual_condition: >
      Sticky bit 디렉터리가 비표준 위치에 존재하거나
      업무 필요성 검토가 필요한 특수권한 항목이 존재하는 경우

final_decision:
  pass:
    - "허용 목록 외 SUID/SGID 설정 파일이 존재하지 않음"

  fail:
    - "허용 목록 외 SUID 설정 파일이 존재함"
    - "허용 목록 외 SGID 설정 파일이 존재함"

  manual:
    - "비표준 Sticky bit 디렉터리가 존재함"
    - "업무 필요성 검토가 필요한 항목이 존재함"

  error:
    - "파일시스템 스캔 자체를 수행하지 못함"

evidence_required:
  - "특수권한 파일 목록"
  - "파일 경로"
  - "소유자"
  - "권한"
  - "업무 필요성 검토 결과"

thresholds:
  require_allowlist_review: true