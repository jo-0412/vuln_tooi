#무엇을 양호/취약으로 볼지 적는 파일
check_type: "composite"

decision_order:
  - "ssh_rule"
  - "telnet_rule"

rules:
  ssh_rule:
    enabled_if:
      service_active_any:
        - "ssh"
        - "sshd"

    target_file: "/etc/ssh/sshd_config"
    key: "PermitRootLogin"

    acceptable_values:
      - "no"

    vulnerable_values:
      - "yes"
      - "prohibit-password"
      - "without-password"
      - "forced-commands-only"

    when_key_missing: "manual"
    when_file_missing: "manual"

    pass_condition: >
      SSH 서비스를 사용 중이며 PermitRootLogin 값이 no 인 경우

    fail_condition: >
      SSH 서비스를 사용 중이며 PermitRootLogin 값이 no 가 아닌 경우

  telnet_rule:
    enabled_if:
      service_active_any:
        - "telnet"
        - "telnet.socket"
        - "inetd"
        - "xinetd"

    checks:
      - file: "/etc/pam.d/login"
        must_contain: "pam_securetty"

      - file: "/etc/securetty"
        must_not_contain_regex: "^pts/[0-9]+"

    when_file_missing: "manual"

    pass_condition: >
      Telnet 계열 서비스를 사용할 경우 pam_securetty 가 적용되어 있고
      /etc/securetty 에 pts/* 허용 항목이 없는 경우

    fail_condition: >
      Telnet 계열 서비스를 사용할 경우 pam_securetty 가 없거나
      /etc/securetty 에 pts/* 허용 항목이 존재하는 경우

final_decision:
  pass:
    - "원격 터미널 서비스를 사용하지 않음"
    - "SSH 사용 시 root 직접 접속 차단"
    - "Telnet 사용 시 root 직접 접속 차단"

  fail:
    - "원격 터미널 서비스 사용 중 root 직접 접속 허용"

  manual:
    - "설정 파일이 없거나 값이 명확하지 않음"
    - "배포판/버전별 기본값 확인 필요"

evidence_required:
  - "PermitRootLogin 설정값"
  - "pam_securetty 적용 여부"
  - "/etc/securetty 내 pts/* 존재 여부"