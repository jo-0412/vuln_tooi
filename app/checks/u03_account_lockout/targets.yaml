files:
  required:
    - path: "/etc/pam.d/common-auth"
      type: "config"
      parser: "pam"
      description: "Debian 계열 인증 실패 누적 및 잠금 정책 확인"

    - path: "/etc/pam.d/common-account"
      type: "config"
      parser: "pam"
      description: "Debian 계열 계정 잠금 해제 및 reset/account 정책 확인"

  optional:
    - path: "/etc/security/faillock.conf"
      type: "config"
      parser: "key_value"
      description: "faillock 기반 deny, unlock_time 설정 확인"

    - path: "/etc/pam.d/system-auth"
      type: "config"
      parser: "pam"
      description: "RHEL 계열 호환 경로"

    - path: "/etc/pam.d/password-auth"
      type: "config"
      parser: "pam"
      description: "RHEL 계열 호환 경로"

    - path: "/etc/default/login"
      type: "config"
      parser: "key_value"
      description: "일부 Unix 계열 로그인 잠금 정책 경로"

    - path: "/etc/security/policy.conf"
      type: "config"
      parser: "key_value"
      description: "일부 Unix 계열 로그인 잠금 정책 경로"

    - path: "/etc/security/user"
      type: "config"
      parser: "key_value"
      description: "일부 Unix 계열 로그인 잠금 정책 경로"

    - path: "/etc/default/security"
      type: "config"
      parser: "key_value"
      description: "일부 Unix 계열 로그인 잠금 정책 경로"

commands:
  - name: "check_authselect"
    command: "authselect current"
    description: "authselect 활성 기능 확인"

  - name: "check_faillock_config"
    command: "grep -E 'deny|unlock_time' /etc/security/faillock.conf"
    description: "faillock.conf 내 deny, unlock_time 값 확인"

  - name: "check_pam_lockout_modules"
    command: "grep -E 'pam_tally|pam_tally2|pam_faillock' /etc/pam.d/common-auth /etc/pam.d/common-account"
    description: "Debian 계열 PAM 잠금 모듈 적용 여부 확인"

evidence:
  - key: "lockout_backend"
    source: "pam/common-auth, pam/common-account, faillock.conf"
    description: "사용 중인 잠금 정책 모듈 종류"

  - key: "deny"
    source: "/etc/security/faillock.conf or PAM module options"
    description: "계정 잠금 임계값"

  - key: "unlock_time"
    source: "/etc/security/faillock.conf or PAM module options"
    description: "잠금 해제 시간"

  - key: "pam_tally_module"
    source: "/etc/pam.d/common-auth or /etc/pam.d/common-account"
    description: "pam_tally.so 적용 여부"

  - key: "pam_tally2_module"
    source: "/etc/pam.d/common-auth or /etc/pam.d/common-account"
    description: "pam_tally2.so 적용 여부"

  - key: "pam_faillock_auth_module"
    source: "/etc/pam.d/common-auth"
    description: "pam_faillock.so auth 체인 적용 여부"

  - key: "pam_faillock_account_module"
    source: "/etc/pam.d/common-account"
    description: "pam_faillock.so account 체인 적용 여부"

  - key: "reset_option"
    source: "/etc/pam.d/common-account"
    description: "pam_tally/pam_tally2 reset 옵션 여부"

  - key: "authselect_profile"
    source: "authselect current"
    description: "활성 authselect 프로파일"