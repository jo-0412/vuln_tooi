check_type: "composite"

profile: "default_linux"

rules:
  inetd_rule:
    description: >
      Telnet should not be enabled in /etc/inetd.conf.

    target_file: "/etc/inetd.conf"

    service_names:
      - "telnet"

    pass_condition: >
      Telnet entries are absent or commented out in /etc/inetd.conf.

    fail_condition: >
      Active Telnet entries exist in /etc/inetd.conf.

  xinetd_rule:
    description: >
      Telnet should be disabled in xinetd configuration.

    target_file: "/etc/xinetd.d/telnet"

    service_name: "telnet"

    disabled_value: "yes"

    fail_values:
      - "no"

    pass_condition: >
      /etc/xinetd.d/telnet is missing or has disable = yes.

    fail_condition: >
      /etc/xinetd.d/telnet has disable = no.

  systemd_rule:
    description: >
      Telnet service or socket should not be active or enabled in systemd.

    service_names:
      - "telnet"
      - "telnetd"
      - "in.telnetd"

    accepted_inactive_states:
      - "inactive"
      - "disabled"
      - "not-found"
      - "unknown"

    fail_active_states:
      - "active"
      - "enabled"

    pass_condition: >
      Telnet service and socket units are inactive, disabled, or not found.

    fail_condition: >
      Telnet service or socket unit is active or enabled.

  replacement_service_rule:
    description: >
      SSH should be used instead of Telnet for remote access.

    recommended_replacement:
      - "ssh"
      - "sshd"

    manual_check_required: true

    pass_condition: >
      Telnet is disabled and SSH is used for secure remote access.

    manual_condition: >
      SSH replacement usage requires manual or separate service verification.

thresholds:
  fail_if_any_active_telnet_service: true

final_decision:
  pass:
    - "Telnet service is disabled."

  fail:
    - "Telnet service is enabled in inetd, xinetd, or systemd."
    - "Telnet service or socket is active or enabled."

  manual:
    - "Telnet service state could not be fully verified."
    - "SSH replacement usage requires manual verification."

  error:
    - "Telnet service configuration or status collection failed."