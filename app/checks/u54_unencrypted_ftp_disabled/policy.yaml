check_type: "composite"

profile: "default_linux"

rules:
  inetd_rule:
    description: >
      Plain FTP should not be enabled in /etc/inetd.conf.

    target_file: "/etc/inetd.conf"

    service_names:
      - "ftp"
      - "ftpd"

    pass_condition: >
      FTP entries are absent or commented out in /etc/inetd.conf.

    fail_condition: >
      Active FTP entries exist in /etc/inetd.conf.

  xinetd_rule:
    description: >
      Plain FTP should be disabled in xinetd configuration.

    target_file: "/etc/xinetd.d/ftp"

    service_name: "ftp"

    disabled_value: "yes"

    fail_values:
      - "no"

    pass_condition: >
      /etc/xinetd.d/ftp is missing or has disable = yes.

    fail_condition: >
      /etc/xinetd.d/ftp has disable = no.

  systemd_rule:
    description: >
      FTP service or socket should not be active or enabled in systemd.

    service_names:
      - "ftp"
      - "ftpd"
      - "vsftpd"
      - "proftpd"
      - "pure-ftpd"

    accepted_inactive_states:
      - "inactive"
      - "disabled"
      - "not-found"
      - "unknown"

    fail_active_states:
      - "active"
      - "enabled"

    pass_condition: >
      FTP service and socket units are inactive, disabled, or not found.

    fail_condition: >
      FTP service or socket unit is active or enabled.

  ftp_config_rule:
    description: >
      FTP daemon configuration files should be reviewed if present,
      because the tool cannot fully determine whether encryption is enforced
      from service presence alone.

    config_files:
      - "/etc/vsftpd.conf"
      - "/etc/vsftpd/vsftpd.conf"
      - "/etc/proftpd/proftpd.conf"
      - "/etc/pure-ftpd/pure-ftpd.conf"

    manual_if_present: true

    pass_condition: >
      No plain FTP daemon configuration file is present, or FTP service is disabled.

    manual_condition: >
      FTP configuration files exist and encryption enforcement requires manual verification.

  replacement_service_rule:
    description: >
      SFTP or FTPS should be used instead of unencrypted FTP.

    recommended_replacement:
      - "sftp"
      - "ftps"

    manual_check_required: true

    pass_condition: >
      Plain FTP is disabled and secure alternatives such as SFTP or FTPS are used.

    manual_condition: >
      SFTP or FTPS replacement usage requires manual or separate verification.

thresholds:
  fail_if_any_active_ftp_service: true
  manual_if_ftp_config_exists: true

final_decision:
  pass:
    - "Unencrypted FTP service is disabled."

  fail:
    - "Unencrypted FTP service is enabled in inetd, xinetd, or systemd."
    - "FTP service or socket is active or enabled."

  manual:
    - "FTP service state could not be fully verified."
    - "FTP configuration files exist and encryption enforcement requires manual verification."
    - "SFTP or FTPS replacement usage requires manual verification."

  error:
    - "FTP service configuration or status collection failed."