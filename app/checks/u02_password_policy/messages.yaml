title: "U-02 비밀번호 관리정책 설정"

pass:
  summary: "비밀번호 관리정책이 적절히 설정되어 있습니다."
  detail: >
    최소 길이, 문자 조합, 비밀번호 변경 주기,
    최근 비밀번호 재사용 금지 정책이 기준에 맞게 설정되어 있어 양호합니다.

fail:
  summary: "비밀번호 관리정책이 없거나 약하게 설정되어 있습니다."
  detail: >
    비밀번호 정책이 약하거나 없어서 짧고 단순한 비밀번호 사용이 가능하며,
    동일 또는 유사 비밀번호 재사용으로 계정 탈취 위험이 높습니다.

manual:
  summary: "자동 판정이 어렵습니다."
  detail: >
    설정 파일 누락, 비표준 PAM 구성, 배포판별 차이 등으로 인해
    추가 확인이 필요합니다.

remediation:
  summary: "비밀번호 복잡도, 변경 주기, 재사용 금지 정책을 강화해야 합니다."
  actions:
    - "/etc/security/pwquality.conf 에 최소 길이 8 이상을 설정합니다."
    - "숫자, 대문자, 소문자, 특수문자 조합 정책을 설정합니다."
    - "가능하면 enforce_for_root 를 추가하여 root 계정에도 동일 정책을 적용합니다."
    - "/etc/login.defs 에 PASS_MIN_DAYS 1, PASS_MAX_DAYS 90 을 설정합니다."
    - "/etc/security/pwhistory.conf 또는 PAM 설정에서 최근 4회 이상 비밀번호 재사용 금지를 설정합니다."
    - "/etc/pam.d/common-password 에서 pam_pwquality.so 와 pam_pwhistory.so 가 pam_unix.so 보다 앞에 적용되도록 정렬합니다."

evidence_labels:
  minlen: "최소 비밀번호 길이"
  dcredit: "숫자 포함 정책"
  ucredit: "대문자 포함 정책"
  lcredit: "소문자 포함 정책"
  ocredit: "특수문자 포함 정책"
  enforce_for_root: "root 계정에도 정책 적용 여부"
  remember: "최근 비밀번호 재사용 금지 횟수"
  pass_min_days: "최소 비밀번호 사용기간"
  pass_max_days: "최대 비밀번호 사용기간"
  pam_pwquality_module: "pam_pwquality.so 적용 여부"
  pam_pwhistory_module: "pam_pwhistory.so 적용 여부"
  pam_unix_module: "pam_unix.so 적용 여부"
  pam_module_order: "PAM 모듈 적용 순서"

notes:
  - "Debian 계열은 /etc/pam.d/common-password 를 우선 확인합니다."
  - "RHEL 계열 호환 처리를 위해 /etc/pam.d/system-auth 는 optional 로 둡니다."
  - "일부 환경에서는 pwhistory 설정이 PAM 라인 옵션으로 직접 들어갈 수 있으므로 fallback 처리가 필요합니다."