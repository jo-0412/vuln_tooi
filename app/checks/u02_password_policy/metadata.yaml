code: "U-02"
name: "비밀번호 관리정책 설정"
severity: "high"
category: "account_management"
requires_root: "partial"

summary: >
  비밀번호 복잡도와 변경 주기를 강제하여
  계정 보안 수준을 높이기 위한 항목이다.

description: >
  비밀번호 최소 길이, 문자 조합, 변경 주기,
  재사용 금지 등의 정책이 적절히 설정되어 있어야 한다.

purpose: >
  짧고 단순한 비밀번호 사용을 방지하고,
  동일 또는 유사 비밀번호 재사용을 제한하여
  계정 탈취 위험을 줄인다.

platform: "debian_family"

references:
  - "/etc/login.defs"
  - "/etc/security/pwquality.conf"
  - "/etc/security/pwhistory.conf"
  - "/etc/pam.d/system-auth"
  - "/etc/pam.d/common-password"
  - "/etc/default/passwd"
  - "/etc/default/security"