files:
  required:
    - path: "/etc/login.defs"
      type: "config"
      parser: "key_value"
      description: "비밀번호 최소/최대 사용기간 확인"

    - path: "/etc/security/pwquality.conf"
      type: "config"
      parser: "key_value"
      description: "비밀번호 복잡도 정책 확인"

    - path: "/etc/pam.d/common-password"
      type: "config"
      parser: "pam"
      description: "Debian 계열 PAM 비밀번호 정책 적용 여부 확인"

  optional:
    - path: "/etc/security/pwhistory.conf"
      type: "config"
      parser: "key_value"
      description: "최근 비밀번호 재사용 금지 횟수 확인"

    - path: "/etc/pam.d/system-auth"
      type: "config"
      parser: "pam"
      description: "RHEL 계열 호환 경로"

    - path: "/etc/default/passwd"
      type: "config"
      parser: "key_value"
      description: "일부 Unix 계열 비밀번호 정책 경로"

    - path: "/etc/default/security"
      type: "config"
      parser: "key_value"
      description: "일부 Unix 계열 비밀번호 정책 경로"

commands:
  - name: "check_password_age"
    command: "grep -E 'PASS_MAX_DAYS|PASS_MIN_DAYS' /etc/login.defs"
    description: "비밀번호 최소/최대 사용기간 확인"

  - name: "check_pwquality"
    command: "grep -E 'minlen|dcredit|ucredit|lcredit|ocredit|enforce_for_root' /etc/security/pwquality.conf"
    description: "비밀번호 복잡도 정책 확인"

  - name: "check_pwhistory"
    command: "grep remember /etc/security/pwhistory.conf"
    description: "비밀번호 재사용 금지 설정 확인"

evidence:
  - key: "minlen"
    source: "/etc/security/pwquality.conf"
    description: "최소 비밀번호 길이"

  - key: "dcredit"
    source: "/etc/security/pwquality.conf"
    description: "숫자 포함 정책"

  - key: "ucredit"
    source: "/etc/security/pwquality.conf"
    description: "대문자 포함 정책"

  - key: "lcredit"
    source: "/etc/security/pwquality.conf"
    description: "소문자 포함 정책"

  - key: "ocredit"
    source: "/etc/security/pwquality.conf"
    description: "특수문자 포함 정책"

  - key: "enforce_for_root"
    source: "/etc/security/pwquality.conf"
    description: "root 계정에도 정책 적용 여부"

  - key: "remember"
    source: "/etc/security/pwhistory.conf"
    description: "최근 비밀번호 재사용 금지 횟수"

  - key: "pass_min_days"
    source: "/etc/login.defs"
    description: "최소 비밀번호 사용기간"

  - key: "pass_max_days"
    source: "/etc/login.defs"
    description: "최대 비밀번호 사용기간"

  - key: "pam_pwquality_module"
    source: "/etc/pam.d/common-password"
    description: "pam_pwquality.so 적용 여부"

  - key: "pam_pwhistory_module"
    source: "/etc/pam.d/common-password"
    description: "pam_pwhistory.so 적용 여부"

  - key: "pam_unix_module"
    source: "/etc/pam.d/common-password"
    description: "pam_unix.so 적용 여부"

  - key: "pam_module_order"
    source: "/etc/pam.d/common-password"
    description: "pam_pwquality.so, pam_pwhistory.so, pam_unix.so 적용 순서"